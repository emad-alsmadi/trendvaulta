<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Bookstore illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.18" />
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.20" />
      <stop offset="1" stop-color="#f472b6" stop-opacity="0.18" />
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f472b6" />
      <stop offset="1" stop-color="#6366f1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect width="1200" height="900" rx="56" fill="url(#bg)" />

  <g filter="url(#shadow)">
    <rect x="210" y="220" width="250" height="420" rx="28" fill="#ffffff" fill-opacity="0.85" />
    <rect x="250" y="250" width="56" height="360" rx="18" fill="url(#spine)" />
    <rect x="320" y="275" width="110" height="16" rx="8" fill="#0f172a" fill-opacity="0.55" />
    <rect x="320" y="315" width="90" height="12" rx="6" fill="#0f172a" fill-opacity="0.30" />
    <rect x="320" y="345" width="125" height="12" rx="6" fill="#0f172a" fill-opacity="0.28" />
    <rect x="320" y="375" width="105" height="12" rx="6" fill="#0f172a" fill-opacity="0.26" />

    <rect x="475" y="190" width="290" height="500" rx="32" fill="#ffffff" fill-opacity="0.82" />
    <rect x="515" y="225" width="62" height="430" rx="18" fill="#22d3ee" fill-opacity="0.75" />
    <rect x="595" y="260" width="150" height="18" rx="9" fill="#0f172a" fill-opacity="0.55" />
    <rect x="595" y="305" width="120" height="12" rx="6" fill="#0f172a" fill-opacity="0.30" />
    <rect x="595" y="335" width="165" height="12" rx="6" fill="#0f172a" fill-opacity="0.28" />
    <rect x="595" y="365" width="140" height="12" rx="6" fill="#0f172a" fill-opacity="0.26" />

    <rect x="785" y="250" width="210" height="390" rx="28" fill="#ffffff" fill-opacity="0.80" />
    <rect x="818" y="280" width="50" height="330" rx="18" fill="#f59e0b" fill-opacity="0.70" />
    <rect x="885" y="305" width="96" height="14" rx="7" fill="#0f172a" fill-opacity="0.50" />
    <rect x="885" y="345" width="78" height="11" rx="6" fill="#0f172a" fill-opacity="0.28" />
    <rect x="885" y="372" width="110" height="11" rx="6" fill="#0f172a" fill-opacity="0.26" />
